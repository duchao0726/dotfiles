###########################################################
# tmux.conf by Chao Du
###########################################################

# True color support
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# Generate xterm-style key sequences
setw -g xterm-keys on

# Remove Escape key delay (important for vim/neovim)
set -sg escape-time 0

# Let vim/neovim know when terminal gains/loses focus
set -g focus-events on

# History
set -g history-limit 50000

# Automatically renumber windows when one is closed
set -g renumber-windows on

# Start window and pane index at 1
set -g base-index 1
setw -g pane-base-index 1

# Set terminal title
set-option -g set-titles on
set-option -g set-titles-string "#T - #W"

# Window size: constrain to the largest client viewing that window
setw -g window-size largest

# Activity monitoring
setw -g monitor-activity on
set -g visual-activity on

# Mouse support (hold Option in iTerm2/Ghostty to select text normally)
set -g mouse on

######################
#### Key Bindings ####
######################

# Prefix: Ctrl+a
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Reload config
bind r source-file ~/.tmux.conf \; display "Config Reloaded!"

# Split windows (keep current path)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# New window
bind N new-window
bind C command-prompt -p "Name of new window: " "new-window -n '%%'"

# Pane navigation (vim-style)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Window navigation
bind -r C-h select-window -t :-
bind -r C-l select-window -t :+

# Pane resize
bind -r H resize-pane -L 2
bind -r J resize-pane -D 2
bind -r K resize-pane -U 2
bind -r L resize-pane -R 2

# Main-horizontal layout (60% for main pane)
bind u set-window-option main-pane-height 60\; select-layout main-horizontal

# Synchronize panes
bind y setw synchronize-panes

######################
#### Vi Copy Mode ####
######################

setw -g mode-keys vi

bind Escape copy-mode
bind p paste-buffer

bind -T copy-mode-vi v   send -X begin-selection
bind -T copy-mode-vi V   send -X select-line
bind -T copy-mode-vi r   send -X rectangle-toggle
# Yank to system clipboard (macOS: pbcopy, Linux: xclip fallback)
bind -T copy-mode-vi y   send -X copy-pipe-and-cancel \
    "pbcopy 2>/dev/null || xclip -selection clipboard 2>/dev/null"

##############################
### Color & Style Settings ###
##############################

source ~/.tmux.theme.conf

##############################
### Plugins (TPM)          ###
##############################
# Install TPM: git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm
# Then press prefix + I inside tmux to install plugins

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'   # prefix + Ctrl-s to save, Ctrl-r to restore

run '~/.tmux/plugins/tpm/tpm'
